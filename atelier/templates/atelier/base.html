{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cohen Haute Couture{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'atelier/css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>

<body>

    <header class="site-header">
        <div class="site-header__inner">
            <a href="{% url 'dashboard' %}" class="brand">
                <svg class="brand__mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="20" cy="20" r="18.5" stroke="#211D1A" stroke-width="1" />
                    <path d="M12 24C15 16 25 16 28 24" stroke="#A17F2D" stroke-width="1.4" stroke-linecap="round" />
                    <circle cx="12" cy="24" r="1.6" fill="#33526E" />
                    <circle cx="28" cy="24" r="1.6" fill="#33526E" />
                    <line x1="20" y1="9" x2="20" y2="14" stroke="#211D1A" stroke-width="1" />
                </svg>
                <span class="brand__text">
                    <span class="brand__name">Cohen Haute Couture</span>
                    <span class="brand__tagline">Maison &amp; atelier de confection</span>
                </span>
            </a>
            
            <!-- Zone d'actions de l'en-tête sécurisée et fixe -->
            <div class="header-actions" style="display: flex; align-items: center; gap: 20px;">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" style="color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500;">Tableau de bord</a>
                    <a href="{% url 'liste_clientes' %}" style="color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500;">Répertoire</a>
                    <a href="{% url 'logout' %}" style="color: var(--wine); text-decoration: none; font-size: 13px; font-weight: 600; margin-right: 10px;">👋 Quitter</a>
                {% endif %}
                
                <!-- Bouton d'administration harmonisé avec ton design -->
                <a href="/admin/" style="display: inline-block; padding: 8px 16px; border: 1px solid var(--ink); color: var(--ink); text-decoration: none; font-size: 11px; letter-spacing: 1px; font-weight: 500; text-transform: uppercase; transition: all 0.2s ease;" onmouseover="this.style.background='var(--line)'" onmouseout="this.style.background='transparent'">
                    Accéder à l'admin
                </a>
            </div>
        </div>
    </header>

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Initialisation de Flatpickr pour le calendrier au clic
            flatpickr(".datepicker", {
                dateFormat: "d/m/Y",
                allowInput: true,
                locale: {
                    firstDayOfWeek: 1
                }
            });

            // 2. Ajout automatique des slashes '/' lors de la saisie manuelle au clavier
            document.querySelectorAll('.datepicker').forEach(function (input) {
                input.addEventListener('input', function (e) {
                    if (e.inputType === 'deleteContentBackward') return;

                    let value = this.value.replace(/\D/g, '');

                    if (value.length === 2) {
                        this.value = value + '/';
                    } 
                    else if (value.length === 4) {
                        this.value = value.slice(0, 2) + '/' + value.slice(2, 4) + '/';
                    } 
                    else if (value.length > 4) {
                        this.value = value.slice(0, 2) + '/' + value.slice(2, 4) + '/' + value.slice(4, 8);
                    }
                });
            });
        });
    </script>
</body>

</html>
