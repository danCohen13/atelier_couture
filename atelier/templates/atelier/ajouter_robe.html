<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Ajouter une Robe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">👗 Lancer une Nouvelle Confection</h2>
        
        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                {{ form.as_p }}
            </div>
            <div class="mt-6 flex justify-end space-x-3">
                <a href="{% url 'dashboard' %}" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-200">Annuler</a>
                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Créer la Robe</button>
            </div>
        </form>
    </div>
</body>
</html>
