{% extends 'atelier/base.html' %}
{% block title %}Ajuster Dossier — {{ cliente.nom }}{% endblock %}

{% block content %}
<main class="page" style="max-width: 600px;">
    <div class="form-card">
        <div class="form-card__inner">
            <span class="eyebrow">Mise à jour</span>
            <h2>Modifier la fiche de {{ cliente.prenom }}</h2>
            
            <form method="POST" style="margin-top: 20px;">
                {% csrf_token %}
                {{ form.as_p }}
                
                <div class="form-actions" style="margin-top: 30px;">
                    <a href="{% url 'fiche_cliente' cliente.id %}" class="btn btn--outline">Annuler</a>
                    <button type="submit" class="btn btn--primary">Enregistrer les modifications</button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
